version: "3.9"

# ── PointCloud Platform — Local Development Stack ─────────────────────────────
#
# Services:
#   api                  — FastAPI backend (port 8000)
#   frontend             — Next.js frontend (port 3000)
#   worker-tiling        — PDAL COPC tiling worker
#   worker-bim           — BIM extraction worker (Cloud2BIM + IfcOpenShell)
#   worker-road          — Road asset extraction worker (PDAL + OpenPCDet)
#   worker-harmonization — PDAL harmonization worker (noise removal, ground classification, DTM)
#   n8n                  — Workflow automation (port 5678)
#   redis                — Cache and future job broker (port 6379)
#   localstack           — Local S3 emulator for development (port 4566)
#
# Usage:
#   cp .env.example .env && fill in values
#   docker-compose up api frontend n8n redis localstack
#   docker-compose up worker-tiling worker-bim worker-road worker-harmonization  (separate terminal)

networks:
  platform:
    driver: bridge

volumes:
  n8n_data:
  redis_data:
  localstack_data:

services:

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Cloudflare R2 (or LocalStack for local dev)
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-http://localstack:4566}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-test}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-test}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-pointcloud-platform-data}
      R2_PUBLIC_BASE: ${R2_PUBLIC_BASE:-http://localhost:4566/pointcloud-platform-data}
      # Stripe billing
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_STARTER_PRICE_ID: ${STRIPE_STARTER_PRICE_ID}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID}
      STRIPE_ENTERPRISE_PRICE_ID: ${STRIPE_ENTERPRISE_PRICE_ID}
      # n8n automation
      N8N_API_URL: http://n8n:5678
      N8N_API_KEY: ${N8N_API_KEY:-changeme}
      N8N_PAYMENT_FAILED_WEBHOOK: ${N8N_PAYMENT_FAILED_WEBHOOK:-}
      N8N_NEW_USER_WEBHOOK: ${N8N_NEW_USER_WEBHOOK:-}
      # App
      APP_DOMAIN: ${APP_DOMAIN:-http://localhost:3000}
      ENVIRONMENT: development
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - platform
    depends_on:
      - n8n
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_CESIUM_ION_TOKEN: ${NEXT_PUBLIC_CESIUM_ION_TOKEN:-}
    command: pnpm dev
    networks:
      - platform

  # ── PDAL Tiling Worker ──────────────────────────────────────────────────────
  worker-tiling:
    build:
      context: ./workers/tiling
      dockerfile: Dockerfile
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-http://localstack:4566}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-test}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-test}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-pointcloud-platform-data}
      R2_PUBLIC_BASE: ${R2_PUBLIC_BASE:-http://localhost:4566/pointcloud-platform-data}
    networks:
      - platform
    restart: unless-stopped

  # ── BIM Extraction Worker ───────────────────────────────────────────────────
  worker-bim:
    build:
      context: ./workers/bim-extraction
      dockerfile: Dockerfile
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-http://localstack:4566}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-test}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-test}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-pointcloud-platform-data}
      R2_PUBLIC_BASE: ${R2_PUBLIC_BASE:-http://localhost:4566/pointcloud-platform-data}
    networks:
      - platform
    restart: unless-stopped

  # ── Road Assets Worker (GPU optional) ──────────────────────────────────────
  worker-road:
    build:
      context: ./workers/road-assets
      dockerfile: Dockerfile
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-http://localstack:4566}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-test}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-test}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-pointcloud-platform-data}
      R2_PUBLIC_BASE: ${R2_PUBLIC_BASE:-http://localhost:4566/pointcloud-platform-data}
      OPENPCDET_MODEL_PATH: /models/pointpillars_traffic_signs.pth
    # Uncomment for GPU access on a CUDA-capable host:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - platform
    restart: unless-stopped

  # ── Harmonization Worker ────────────────────────────────────────────────────
  worker-harmonization:
    build:
      context: ./workers/harmonization
      dockerfile: Dockerfile
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-http://localstack:4566}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-test}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-test}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-pointcloud-platform-data}
      R2_PUBLIC_BASE: ${R2_PUBLIC_BASE:-http://localhost:4566/pointcloud-platform-data}
    networks:
      - platform
    restart: unless-stopped

  # ── n8n Workflow Automation ─────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.70.3
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: UTC
      N8N_PUBLIC_API_DISABLED: "false"
      N8N_API_KEY: ${N8N_API_KEY:-changeme}
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - platform
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - platform
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── LocalStack (local S3 emulator for development) ──────────────────────────
  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      PERSISTENCE: 1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    networks:
      - platform
